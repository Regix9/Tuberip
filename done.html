<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TubeRip — Download Ready</title>
  <link rel="stylesheet" href="assets/style.css"/>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js" defer></script>
  <style>
    main {
      flex: 1;
      padding: 7rem 2rem 4rem;
    }
    .page-inner {
      max-width: 760px;
      margin: 0 auto;
    }

    /* Success header */
    .success-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .success-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(197,160,89,.1);
      border: 1px solid rgba(197,160,89,.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      animation: scaleIn .5s cubic-bezier(.16,1,.3,1);
    }
    @keyframes scaleIn { from { transform: scale(0); opacity:0; } to { transform: scale(1); opacity:1; } }
    .success-header h1 {
      font-family: 'Bespoke Serif', serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 400;
      margin-bottom: .5rem;
    }
    .success-header p {
      color: #475569;
      font-size: .8rem;
      font-weight: 300;
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    /* File card */
    .file-card {
      padding: 2.5rem;
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(197,160,89,.12);
      margin-bottom: 1.5rem;
    }
    .file-card-top {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
      margin-bottom: 2rem;
    }
    .file-icon-wrap {
      width: 64px; height: 64px;
      background: rgba(197,160,89,.08);
      border: 1px solid rgba(197,160,89,.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .file-info h2 {
      font-family: 'Bespoke Serif', serif;
      font-size: 1.1rem;
      margin-bottom: .6rem;
      word-break: break-all;
    }
    .file-chips {
      display: flex;
      flex-wrap: wrap;
      gap: .75rem;
    }
    .file-chip {
      display: flex;
      align-items: center;
      gap: .35rem;
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .file-chip iconify-icon { font-size: .9rem; }

    /* Download button */
    .download-main {
      width: 100%;
      height: 60px;
      font-size: .75rem;
      margin-bottom: .75rem;
    }

    /* Spec table */
    .spec-table {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,.05);
    }
    .spec-table-lbl {
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: #334155;
      margin-bottom: 1.25rem;
    }
    .spec-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1.5rem;
    }
    .spec-cell .lbl {
      font-size: .55rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: .3rem;
    }
    .spec-cell .val {
      font-family: 'Bespoke Serif', serif;
      font-size: .95rem;
      color: #fff;
    }

    /* Bottom actions */
    .bottom-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.5rem 0;
    }
    .expiry-note {
      font-size: .6rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: #334155;
    }
    .bottom-btns { display: flex; gap: .75rem; flex-wrap: wrap; }

    /* Confetti / glow */
    .glow-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(197,160,89,.4), transparent);
      margin-bottom: 2rem;
      animation: glowPulse 3s ease infinite;
    }
    @keyframes glowPulse {
      0%,100% { opacity: .4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <nav></nav>
  <main>
    <div class="page-inner">
      <!-- Glow line -->
      <div class="glow-line"></div>

      <!-- Success header -->
      <div class="success-header">
        <div class="success-icon">
          <iconify-icon icon="lucide:check" style="color:var(--gold);font-size:2rem"></iconify-icon>
        </div>
        <h1 class="font-serif">Extraction <em class="gold-text">Complete</em></h1>
        <p>Your high-fidelity master is ready for download</p>
      </div>

      <!-- File card -->
      <div class="file-card">
        <div class="file-card-top">
          <div class="file-icon-wrap">
            <iconify-icon id="file-icon" icon="lucide:file-video" style="color:var(--gold);font-size:1.8rem"></iconify-icon>
          </div>
          <div class="file-info">
            <h2 id="file-name">—</h2>
            <div class="file-chips">
              <div class="file-chip"><iconify-icon icon="lucide:hard-drive"></iconify-icon> <span id="chip-format">—</span></div>
              <div class="file-chip"><iconify-icon icon="lucide:layers"></iconify-icon> <span id="chip-quality">—</span></div>
              <div class="file-chip"><iconify-icon icon="lucide:clock"></iconify-icon> <span id="chip-duration">—</span></div>
            </div>
          </div>
        </div>

        <!-- Download button -->
        <a id="download-link" href="#" class="gold-btn download-main shimmer" download>
          <iconify-icon icon="lucide:download"></iconify-icon>
          Download Master File
        </a>
        <p style="text-align:center;color:#334155;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase">
          File streams directly from server — no third-party storage
        </p>

        <!-- Specs -->
        <div class="spec-table">
          <p class="spec-table-lbl">Technical Specifications</p>
          <div class="spec-grid">
            <div class="spec-cell">
              <div class="lbl">Encoding</div>
              <div class="val" id="spec-encoding">—</div>
            </div>
            <div class="spec-cell">
              <div class="lbl">Audio</div>
              <div class="val" id="spec-audio">—</div>
            </div>
            <div class="spec-cell">
              <div class="lbl">Resolution</div>
              <div class="val" id="spec-res">—</div>
            </div>
            <div class="spec-cell">
              <div class="lbl">SHA-256</div>
              <div class="val" id="spec-hash" style="font-family:monospace;font-size:.7rem;color:#475569">—</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom actions -->
      <div class="bottom-actions">
        <p class="expiry-note">⏳ Download link expires in 24 hours</p>
        <div class="bottom-btns">
          <a href="index.html" class="outline-btn" style="padding:.6rem 1.5rem;font-size:.6rem">
            <iconify-icon icon="lucide:plus"></iconify-icon>
            New Download
          </a>
        </div>
      </div>
    </div>
  </main>

  <footer></footer>
  <div id="error-toast"></div>

  <script src="assets/app.js"></script>
  <script>
    injectNav('Downloader');
    injectFooter();

    const job     = Store.get('job');
    const options = Store.get('options');
    const info    = Store.get('info');

    if (!job || !options) { window.location.href = 'index.html'; }

    function formatDuration(secs) {
      if (!secs) return '—';
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      return h ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
               : `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    const isAudio   = options.format === 'audio';
    const ext       = isAudio ? 'mp3' : 'mp4';
    const safeTitle = (options.title || 'tuberip_download').replace(/[^a-z0-9_\-\s]/gi,'_').replace(/\s+/g,'_');
    const fileName  = `${safeTitle}.${ext}`;

    document.getElementById('file-name').textContent = fileName;
    document.getElementById('file-icon').setAttribute('icon', isAudio ? 'lucide:file-audio' : 'lucide:file-video');
    document.getElementById('chip-format').textContent  = isAudio ? 'MP3 Audio' : 'MP4 Video';
    document.getElementById('chip-quality').textContent = options.quality || '—';
    document.getElementById('chip-duration').textContent = formatDuration(info && info.duration);
    document.title = `TubeRip — ${fileName}`;

    // Specs
    document.getElementById('spec-encoding').textContent = isAudio ? 'MP3 / LAME' : 'H.264 / H.265';
    document.getElementById('spec-audio').textContent    = isAudio ? options.quality : 'AAC / 192kbps';
    document.getElementById('spec-res').textContent      = isAudio ? 'N/A' : (options.quality || '—');
    document.getElementById('spec-hash').textContent     = job.sha256
      ? job.sha256.slice(0,8) + '...' + job.sha256.slice(-4)
      : 'Pending';

    // Download link
    const dlUrl = job.downloadUrl
      ? (job.downloadUrl.startsWith('http') ? job.downloadUrl : `${API_BASE}${job.downloadUrl}`)
      : `${API_BASE}/api/download/file/${job.jobId}`;

    const link = document.getElementById('download-link');
    link.href = dlUrl;
    link.setAttribute('download', fileName);

    link.addEventListener('click', () => {
      // After a moment, clear storage and show a small success note
      setTimeout(() => { Store.clear(); }, 5000);
    });
  </script>
</body>
</html>
